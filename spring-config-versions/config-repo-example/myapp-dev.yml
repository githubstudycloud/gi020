# ============================================================
# myapp 的 dev 环境配置
# 文件名：myapp-dev.yml（对应 application=myapp，profile=dev）
# 加载优先级：myapp-dev.yml > myapp.yml > application.yml
# ============================================================

app:
  message: "Hello from Config Server [DEV]"
  version: "1.0.0-dev"
  feature-flags:
    new-ui: true
    dark-mode: true

# 数据库配置（加密值以 {cipher} 开头）
spring:
  datasource:
    url: jdbc:mysql://dev-db:3306/myapp_dev
    username: dev_user
    password: '{cipher}AQA8xxxxxxEncryptedPasswordxxxxxx'

# 开发环境日志级别
logging:
  level:
    com.example: DEBUG
    org.springframework.cloud.config: DEBUG
