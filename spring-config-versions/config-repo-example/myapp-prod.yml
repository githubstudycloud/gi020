# ============================================================
# myapp 的 prod 环境配置
# 文件名：myapp-prod.yml（对应 application=myapp，profile=prod）
# ============================================================

app:
  message: "Hello from Config Server [PROD]"
  version: "1.0.0"
  feature-flags:
    new-ui: false
    dark-mode: false

spring:
  datasource:
    url: jdbc:mysql://prod-db:3306/myapp_prod
    username: prod_user
    password: '{cipher}AQBKxxxxxxEncryptedProdPasswordxx'

logging:
  level:
    com.example: WARN
    root: ERROR
